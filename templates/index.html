<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
    .container { background: white; border-radius: 12px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; margin-bottom: 24px; color: #1a1a1a; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #4f46e5; }
    button.add { padding: 10px 18px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button.add:hover { background: #4338ca; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; width: 100%; }
    .todo-item:last-child { border-bottom: none; }
    .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #4f46e5; flex: none; }
    .todo-item span { flex: 1; font-size: 15px; color: #333; }
    .todo-item span.done { text-decoration: line-through; color: #aaa; }
    .empty { text-align: center; color: #aaa; padding: 32px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo List</h1>
    <div class="input-row">
      <input id="input" type="text" placeholder="Новая задача..." onkeydown="if(event.key==='Enter') addTodo()">
      <button class="add" onclick="addTodo()">Добавить</button>
    </div>
    <div id="list"></div>
  </div>

  <script>
    async function loadTodos() {
      const res = await fetch('/todos');
      const todos = await res.json();
      const list = document.getElementById('list');
      if (todos.length === 0) {
        list.innerHTML = '<div class="empty">Задач пока нет</div>';
        return;
      }
     list.innerHTML = todos.map(t => `
      <div class="todo-item">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id}, this.checked)">
        <span class="${t.done ? 'done' : ''}">${t.title}</span>
        <button onclick="deleteTodo(${t.id})" style="background:none;border:none;cursor:pointer;font-size:18px;color:#aaa;">🗑</button>
      </div>
    `).join('');
    }

    async function addTodo() {
      const input = document.getElementById('input');
      const title = input.value.trim();
      if (!title) return;
      await fetch('/todos', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title})
      });
      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id, done) {
      await fetch(`/todos/${id}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({done})
      });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`/todos/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    loadTodos();
  </script>
</body>
</html>
